<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox 2026 - Fixed Mobile & Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --rbx-green: #00b06f; --bg: #f2f4f5; }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; height: 100%; background: var(--bg); overflow: hidden; touch-action: none; }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .top-nav { height: 50px; background: var(--rbx-green); display: flex; align-items: center; padding: 0 15px; color: white; position: relative; z-index: 1000; }
        
        /* ГЛАВНОЕ МЕНЮ (АДАПТИВНОЕ) */
        .main-container { display: flex; height: calc(100vh - 50px); }
        .sidebar { width: 200px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .nav-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #eee; text-align: center; font-weight: bold; color: #444; }
        .nav-item.active { background: #eee; color: var(--rbx-green); border-left: 5px solid var(--rbx-green); }

        /* МОБИЛЬНОЕ МЕНЮ (НИЖНЕЕ) */
        @media (max-width: 768px) {
            .sidebar { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; flex-direction: row; z-index: 2000; border-right: none; border-top: 1px solid #ddd; }
            .nav-item { flex: 1; padding: 10px; font-size: 12px; border-bottom: none; border-top: 3px solid transparent; }
            .nav-item.active { border-left: none; border-top: 3px solid var(--rbx-green); }
            .main-view { padding-bottom: 70px !important; margin-left: 0 !important; width: 100% !important; }
        }

        .main-view { flex: 1; padding: 20px; overflow-y: auto; box-sizing: border-box; }
        .page { display: none; }
        .page.active { display: block; }

        /* РЕГИСТРАЦИЯ */
        #reg-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f2f4f5; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .reg-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        
        /* ЧАТ */
        #chat-ui { position: fixed; top: 60px; left: 10px; width: 220px; height: 160px; background: rgba(0,0,0,0.6); border-radius: 8px; z-index: 3000; display: flex; flex-direction: column; padding: 8px; color: white; pointer-events: auto; }
        #chat-msgs { flex: 1; overflow-y: auto; font-size: 12px; margin-bottom: 5px; }
        #chat-in { background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px; border-radius: 4px; }

        /* КНОПКИ УПРАВЛЕНИЯ В ИГРЕ */
        #mobile-game-btns { position: fixed; bottom: 80px; right: 20px; z-index: 4000; display: none; }
        .jump-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: black; pointer-events: auto; }

        .play-btn { background: var(--rbx-green); color: white; border: none; padding: 15px 40px; border-radius: 10px; font-size: 20px; cursor: pointer; font-weight: bold; }
        #game-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2500; display: none; background: #000; }
    </style>
</head>
<body>

<div id="reg-screen">
    <div class="reg-card">
        <h2>Добро пожаловать</h2>
        <input type="text" id="nick-in" placeholder="Твой ник (Русские буквы)" style="padding: 12px; width: 200px; border: 1px solid #ddd; border-radius: 5px;"><br><br>
        <button class="play-btn" style="padding: 10px 30px; font-size: 16px;" onclick="doReg()">Войти</button>
    </div>
</div>

<div class="top-nav">
    <div style="font-weight: 900; font-size: 18px;">ROBLOX 2026</div>
    <div style="margin-left: auto; font-size: 14px;" id="stat-user">Юзер: ...</div>
</div>

<div class="main-container">
    <div class="sidebar">
        <div class="nav-item active" onclick="showTab('home', this)">Home</div>
        <div class="nav-item" onclick="showTab('games', this)">Games</div>
        <div class="nav-item" onclick="showTab('shop', this)">Shop</div>
        <div class="nav-item" onclick="showTab('profile', this)">Profile</div>
    </div>

    <div class="main-view">
        <div id="home" class="page active">
            <h1>Привет, <span id="hello-name">Игрок</span>!</h1>
            <p>Добавляй друзей по нику во вкладке Profile и играй вместе.</p>
        </div>

        <div id="games" class="page">
            <h2>Доступные игры</h2>
            <div style="background: white; padding: 20px; border-radius: 10px; display: inline-block; text-align: center;">
                <div style="font-size: 50px;">🏞️</div>
                <b>Classic Baseplate</b><br><br>
                <button class="play-btn" onclick="startGame()">ИГРАТЬ</button>
            </div>
        </div>

        <div id="shop" class="page">
            <h2>Магазин (Скоро)</h2>
            <p>Здесь будут скины и вещи за Робуксы.</p>
        </div>

        <div id="profile" class="page">
            <h2>Твой профиль</h2>
            <p><b>Юзернейм:</b> <span id="my-username">...</span></p>
            <hr>
            <h3>Добавить друга</h3>
            <input type="text" id="f-search" placeholder="Ник друга..." style="padding: 10px;">
            <button onclick="connectFriend()" style="padding: 10px; background: #000; color: white; border: none; border-radius: 5px;">Найти</button>
        </div>
    </div>
</div>

<div id="chat-ui">
    <div id="chat-msgs"></div>
    <input type="text" id="chat-in" placeholder="Нажми Enter...">
</div>

<div id="game-view">
    <button style="position: absolute; top: 15px; right: 15px; z-index: 5000; padding: 10px 20px; background: red; color: white; border: none; border-radius: 5px;" onclick="stopGame()">ВЫЙТИ</button>
    <div id="mobile-game-btns"><div class="jump-btn" id="j-btn">JUMP</div></div>
    <div id="render-cont"></div>
</div>

<script>
    let myNick = localStorage.getItem('rbx_nick') || "";
    let peer, conn, friendMesh;

    if(myNick) { document.getElementById('reg-screen').style.display = 'none'; startNet(); }

    function doReg() {
        let val = document.getElementById('nick-in').value.trim();
        if(/^[а-яА-ЯёЁ]+$/.test(val) && val.length > 2) {
            localStorage.setItem('rbx_nick', val);
            location.reload();
        } else alert("Введи ник русскими буквами!");
    }

    function startNet() {
        document.getElementById('hello-name').innerText = myNick;
        document.getElementById('my-username').innerText = myNick;
        document.getElementById('stat-user').innerText = "Юзер: " + myNick;

        // Генерация ID для сети
        let netId = "r26_" + btoa(unescape(encodeURIComponent(myNick))).replace(/=/g, "");
        peer = new Peer(netId);
        peer.on('connection', c => handleConn(c));
    }

    function connectFriend() {
        let f = document.getElementById('f-search').value.trim();
        let fId = "r26_" + btoa(unescape(encodeURIComponent(f))).replace(/=/g, "");
        handleConn(peer.connect(fId));
    }

    function handleConn(c) {
        conn = c;
        conn.on('open', () => addMsg("Система: Друг подключен!"));
        conn.on('data', d => {
            if(d.type === 'chat') addMsg("Друг: " + d.msg);
            if(d.type === 'pos' && friendMesh) { friendMesh.position.set(d.x, d.y, d.z); friendMesh.visible = true; }
        });
    }

    function addMsg(t) {
        let m = document.createElement('div'); m.innerText = t;
        document.getElementById('chat-msgs').appendChild(m);
        document.getElementById('chat-msgs').scrollTop = 9999;
    }

    document.getElementById('chat-in').onkeypress = (e) => {
        if(e.key === 'Enter' && e.target.value) {
            addMsg("Я: " + e.target.value);
            if(conn) conn.send({type:'chat', msg: e.target.value});
            e.target.value = "";
        }
    };

    function showTab(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // --- 3D ДВИЖОК ---
    let scene, camera, renderer, player, inGame = false;
    let vY = 0;

    function startGame() {
        document.getElementById('game-view').style.display = 'block';
        if('ontouchstart' in window) document.getElementById('mobile-game-btns').style.display = 'block';
        inGame = true;
        init3D();
    }

    function stopGame() {
        document.getElementById('game-view').style.display = 'none';
        document.getElementById('mobile-game-btns').style.display = 'none';
        inGame = false;
        location.reload(); 
    }

    function init3D() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Небо

        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('render-cont').appendChild(renderer.domElement);

        // Свет (чтобы не было черного экрана)
        let light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        // Игрок
        player = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshLambertMaterial({color: 0xcccccc}));
        player.position.y = 1;
        scene.add(player);

        // Друг
        friendMesh = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshLambertMaterial({color: 0x00ff00}));
        friendMesh.visible = false;
        scene.add(friendMesh);

        // Земля
        let ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshLambertMaterial({color: 0x555555}));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        camera.position.set(0, 5, 10);
        
        document.getElementById('j-btn').ontouchstart = () => { if(player.position.y < 1.1) vY = 0.3; };
        
        animate();
    }

    function animate() {
        if(!inGame) return;
        requestAnimationFrame(animate);

        // Физика
        vY -= 0.015; player.position.y += vY;
        if(player.position.y < 1) { player.position.y = 1; vY = 0; }

        // Постоянное движение вперед для теста
        player.position.z -= 0.04;

        // Камера следует за игроком
        camera.position.lerp(new THREE.Vector3(player.position.x, player.position.y + 4, player.position.z + 8), 0.1);
        camera.lookAt(player.position);

        if(conn) conn.send({type:'pos', x:player.position.x, y:player.position.y, z:player.position.z});

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
